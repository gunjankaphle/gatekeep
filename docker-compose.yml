version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gatekeep-postgres
    environment:
      POSTGRES_USER: gatekeep
      POSTGRES_PASSWORD: gatekeep
      POSTGRES_DB: gatekeep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeep"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack with Snowflake emulator for testing
  localstack:
    image: localstack/snowflake
    container_name: gatekeep-localstack
    ports:
      - "4566:4566"  # LocalStack gateway
      - "4510-4560:4510-4560"  # Snowflake emulator ports
    environment:
      - SERVICES=snowflake
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./test/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gatekeep-server:
    build: .
    container_name: gatekeep-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgres://gatekeep:gatekeep@postgres:5432/gatekeep?sslmode=disable
      SERVER_PORT: 8080
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
    command: ["gatekeep-server"]

volumes:
  postgres_data:
